resources:
  jobs:
    test_agent:
      name: "Test — AI Model Selection Agent"
      tasks:
        - task_key: agent_selector
          notebook_task:
            notebook_path: ../src/04_models/agent_model_selector.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              model_endpoint: "databricks-claude-sonnet-4-6"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk
